appId: com.ai-nexus.workbench
productName: AI Nexus 汇智台
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - package.json

extraResources:
  - from: server
    to: server
    filter:
      - dist/**/*
      - node_modules/**/*
      - package.json

asar: true

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSHighResolutionCapable: true
    NSSupportsAutomaticGraphicsSwitching: true

dmg:
  title: AI Nexus Installer
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

win:
  target:
    - nsis

linux:
  target:
    - AppImage
    - deb
